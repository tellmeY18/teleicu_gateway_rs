name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-release-
            ${{ runner.os }}-target-

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/x86_64-unknown-linux-gnu/release/teleicu-gateway artifacts/
          chmod +x artifacts/teleicu-gateway

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teleicu-gateway-linux-x86_64
          path: artifacts/teleicu-gateway
          if-no-files-found: error

  build-linux-x86_64-musl:
    name: Build Linux x86_64 (static/musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-musl-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-target-release-
            ${{ runner.os }}-musl-target-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/x86_64-unknown-linux-musl/release/teleicu-gateway artifacts/teleicu-gateway-static
          chmod +x artifacts/teleicu-gateway-static

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teleicu-gateway-linux-x86_64-static
          path: artifacts/teleicu-gateway-static
          if-no-files-found: error

  build-linux-x86_64-musl-debug:
    name: Build Linux x86_64 Debug (static/musl)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-musl-target-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-target-debug-
            ${{ runner.os }}-musl-target-

      - name: Build debug binary
        run: cargo build --target x86_64-unknown-linux-musl

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/x86_64-unknown-linux-musl/debug/teleicu-gateway artifacts/teleicu-gateway-debug
          chmod +x artifacts/teleicu-gateway-debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teleicu-gateway-linux-x86_64-musl-debug
          path: artifacts/teleicu-gateway-debug
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux-x86_64, build-linux-x86_64-musl]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/teleicu-gateway-linux-x86_64/teleicu-gateway
            artifacts/teleicu-gateway-linux-x86_64-static/teleicu-gateway-static
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
